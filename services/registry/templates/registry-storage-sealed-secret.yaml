apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: registry-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  template:
    type: Opaque
  encryptedData:
    remote: {{ .Values.secrets.REMOTE_NAME | quote }}
    configData: {{ .Values.secrets.REMOTE_CONFIGURATION_DATA | quote }}
