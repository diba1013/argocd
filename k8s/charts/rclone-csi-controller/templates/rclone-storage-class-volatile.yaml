{{- $values := index .Values "rclone-csi-driver" -}}
{{- if $values.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rclone-volatile
provisioner: rclone.csi.veloxpack.io
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
allowVolumeExpansion: true
parameters:
  remotePath: "buckets/${pvc.metadata.namespace}/${pvc.metadata.name}"
  csi.storage.k8s.io/node-publish-secret-name: "${pvc.annotations['rclone.csi.veloxpack.io/secret-name']}"
  csi.storage.k8s.io/node-publish-secret-namespace: "${pvc.namespace}"
mountOptions:
  # Cache Configuration for Victoria Metrics (write-heavy workload)
  - vfs-cache-mode=writes
  - vfs-cache-max-size=5G
  - vfs-cache-max-age=48h
  - vfs-cache-poll-interval=30s

  # Network & Performance options
  - vfs-read-ahead=512M
  - buffer-size=64M
  - async-read=true
  - dir-cache-time=720h

  # Write optimization for time-series data
  - vfs-write-buffer-size=16M
  - vfs-write-threshold=8M

  # Stability options (adjust based on remote provider rate limits)
  - tpsLimit=50
  - tpsLimit-burst=100
{{- end }}
