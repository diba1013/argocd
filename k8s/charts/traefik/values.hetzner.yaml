secrets:
  EXTERNAL_IP: 

traefik:
  # Schedule controller only on the static node to allow a static IP but not expose the master node.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: static
                operator: In
                values:
                  - "true"
  # Since we only use a single node and the deployment uses host-ports, we need to use recreate here.
  # This will incur a small downtime during updates.
  updateStrategy:
    type: Recreate

  env:
    - name: NODE_EXTERNAL_IP
      valueFrom:
        secretKeyRef:
          name: traefik-secrets
          key: EXTERNAL_IP

  # Use a host port for public access so that we do not need to provision a load balancer.
  ports:
    web:
      hostPort: 80
    websecure:
      hostPort: 443

  # This avoids any kube-proxy or port-clash issues.
  service:
    enabled: false

  # We need to enable this argument for traefik to update ingress status via external IP.
  # This is really only required for ArgoCD to stop complaining about pending ingresses.
  additionalArguments:
    # Have kubernetes resolve the secret value since traefik does not ship with a shell wrapper capable of expanding the variable.
    - --providers.kubernetesingress.ingressEndpoint.ip=$(NODE_EXTERNAL_IP)
