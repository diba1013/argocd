metadata:
  namespace: victoria-metrics

secrets:
  # Default Grafana admin credentials.
  GRAFANA_USER: ""
  GRAFANA_PASSWORD: ""
  # Storage backend configuration.
  REMOTE_NAME: ""
  REMOTE_CONFIGURATION_DATA: ""

victoria-metrics:
  fullnameOverride: victoria-metrics

  victoria-metrics-operator:
    enabled: false

  grafana:
    admin:
      existingSecret: victoria-metrics-grafana
      userKey: GRAFANA_USER
      passwordKey: GRAFANA_PASSWORD
    ingress:
      enabled: false
      annotations: {}

  prometheus-node-exporter:
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      - effect: NoExecute
        key: CriticalAddonsOnly
        value: "true"
    vmScrape:
      spec:
        endpoints:
          - port: metrics
            # Override the hostname to use the bubernetes name instead to account for custom nodes.
            relabelConfigs:
              - sourceLabels: [__meta_kubernetes_pod_node_name]
                targetLabel: nodename
                action: replace
            metricRelabelConfigs:
              # Remove the original nodename label from the metrics that is collected from the exporter.
              - action: labeldrop
                regex: exported_nodename
              # Default values
              - action: drop
                source_labels: [mountpoint]
                regex: "/var/lib/kubelet/pods.+"
